front:
  text: 敘淨土往生傳宋福唐飛山沙門戒珠敘給孤園中聖賢之眾畢集是時眾無一辭之請如來遽然而告曰過是西方十萬億國有淨土焉其土廣博百寶成焉又曰眾生思焉念焉求而以生者皆如願焉說者曰十二分教以羅萬有此乃無問自說之一分也其義猶何猶母之拊嬰兒不俟其請但欲顧其手足乳而哺之腹而擁之也然如來捨淨梵降迦維其說法者五十年流慈振毓隨機有授其間龍天釋梵聲聞緣覺大菩薩眾棄頭目捐髓腦外於國城珍寶殷勤三請者非一如來或辭或默止止而不說也有之至是而乃自說誠悲五濁異生流浪而不息者長劫夫將厭五濁期生于淨土必在乎專念念言之至以繫乎想十六觀所以第資焉經稱諸佛正遍知海從心想生其故何哉明其始也舉其漸之之謂也行始於有修智始於有習無上極果以始于深心深心者確乎其不可拔者也故一念轉三塗之苦十念階九品之善此雖大乘方等諸經皆所互陳而互發非止一經言而發之也漢魏已來翹誠西向蔑聞其有人者實以大法初流經文之未備矣西晉時劉曜寇蕩京雒僧顯避地江東始由三事因願驟感祥異然其拳拳之志以遭亂世遺風勝業代或無聞東晉之末遠師憩跡廬阜其時同意法師釋道炳竺道生佛陀耶舍洎在家英豪劉遺民雷次宗周續之等一百二十三人締結方外之遊希風來集遠以幻集之期不克以常保夢遊之軀不可以長存因指無量壽國結之遐遊焉其已也又言其國清淨無三塗無六趣眾生依向不一生而生者寶幢為之前導金蓮為之受質於是相與而有蓮社之想焉今之以蓮社云云蓋其始也或時以為淨社義亦詳矣自遠而下淨土之修益振故宋有曇弘齊有慧進梁有道珍李唐之間頴悟通識之士如道綽善導者累復有焉余以像季之餘值佛遺法懷淨業其亦有年每以前賢事績散於諸傳淪於異代不得類例相從條然以見繇是歷考梁隋而下慧皎道宣諸師所撰傳記十有二家洎大宋通慧大師新傳且得顯等七十五人其傳之作理或有所暗昧辭或有所叢脞因復修正而發明之外有鴻業慧明等六十二人在其生平想像至於捨生之際不甞以矚勝相備之不足起深信乃無以備之後之明哲或患其所不足摭而備之者亦余之闕有補焉
